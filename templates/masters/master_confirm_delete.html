{% extends "base.html" %}
{% block title %}Удалить мастера{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h2 class="h5">Удалить мастера "{{ master.user.get_full_name|default:master.user.username }}"?</h2>
    <p>Это действие нельзя отменить.</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Удалить</button>
      <a class="btn btn-secondary" href="{% url 'masters:admin_list' %}">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
