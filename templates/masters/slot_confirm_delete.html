{% extends "base_dashboard.html" %}
{% block title %}Удалить слот{% endblock %}
{% block topbar_title %}Удалить слот{% endblock %}
{% block content %}
<section class="section">
  <div class="panel">
    <div class="panel-header">
      <div>
        <span class="eyebrow"><i class="ri-alert-line"></i> Подтверждение</span>
        <h2 class="mb-1">Удалить слот {{ slot.start_at|date:"d.m.Y H:i" }}?</h2>
        <p class="text-muted mb-0">Это действие нельзя отменить.</p>
      </div>
    </div>
    <form method="post" class="d-flex flex-wrap gap-2">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Удалить</button>
      <a class="btn btn-secondary" href="{% url 'masters:slot_list' %}">Отмена</a>
    </form>
  </div>
</section>
{% endblock %}
