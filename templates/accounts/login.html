{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="section">
  <div class="auth-layout">
    <div class="auth-aside">
      <span class="eyebrow"><i class="ri-lock-line"></i> Безопасный вход</span>
      <h2 class="mb-3">С возвращением</h2>
      <p class="text-muted mb-0">Войдите, чтобы управлять записями, получать напоминания и персональные предложения.</p>
    </div>
    <div class="auth-card">
      <h3 class="mb-3">Вход в систему</h3>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100" type="submit">Войти</button>
      </form>
      <p class="mt-3 mb-0">Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a></p>
    </div>
  </div>
</section>
{% endblock %}
