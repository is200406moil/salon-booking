{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h4 mb-3">Вход в систему</h2>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary" type="submit">Войти</button>
        </form>
        <p class="mt-3">Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
