{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h4 mb-3">Регистрация клиента</h2>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-success" type="submit">Создать аккаунт</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
