{% extends "base.html" %}
{% block title %}Новая запись{% endblock %}
{% block content %}
<div class="row">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h4 mb-3">Записаться на услугу</h2>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary" type="submit">Подтвердить</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
