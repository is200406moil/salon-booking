{% extends "base.html" %}
{% block title %}Новая запись{% endblock %}
{% block content %}
<section class="section">
  <div class="row g-4">
    <div class="col-lg-7">
      <div class="panel">
        <div class="panel-header">
          <div>
            <span class="eyebrow"><i class="ri-calendar-check-line"></i> Онлайн запись</span>
            <h2 class="mb-0">Записаться на услугу</h2>
          </div>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary" type="submit">Подтвердить</button>
        </form>
      </div>
    </div>
    <div class="col-lg-5">
      <div class="panel">
        <h4>Что будет дальше</h4>
        <p class="text-muted">После подтверждения запись появится в личном кабинете, а мы отправим напоминание.</p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
